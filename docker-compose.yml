services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: travel_agent
      POSTGRES_PASSWORD: travel_agent
      POSTGRES_DB: travel_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
